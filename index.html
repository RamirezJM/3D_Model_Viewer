<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  
  <model-viewer 
  id="modelo-clima"
  src="assets/models/robot.glb" 
  ar 
  camera-controls 
  touch-action="pan-y"
  poster="imagen-del-equipo.webp"
  reveal="interaction"
  shadow-intensity="1">
  
  <!-- Lo que se ve antes de cargar el 3D -->
  <div slot="poster" id="lazy-load-poster"></div>
  <button slot="poster" id="button-load">Ver en 360°</button>
  
</model-viewer>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
  <script src="assets/js/script.js" type="module"></script>
</body>
</html>
